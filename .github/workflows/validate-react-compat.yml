name: Validate React Compatibility

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: React ${{ matrix.react-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        react-version:
          - 18.3.1
          - 19.2.0

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install React ${{ matrix.react-version }}
        run: npm install --no-save react@${{ matrix.react-version }} react-dom@${{ matrix.react-version }}

      - name: Run tests
        run: npm test -- --run

      - name: Build library
        run: npm run build
